# =============================================================================
# Perfil PRODUÇÃO — todos os segredos vêm de variáveis de ambiente.
# Obrigatório: SPRING_PROFILES_ACTIVE=prod
# =============================================================================

server.address=${SERVER_ADDRESS:0.0.0.0}
server.port=${SERVER_PORT:5000}

# Datasource (obrigatório via env)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.Driver

# Produção: sem SQL no log
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}

# Swagger / OpenAPI — totalmente desabilitado
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
spring.application.swagger.auto-open=false

# JWT (obrigatório via env — mínimo 32 caracteres)
jwt.secret=${JWT_SECRET}

# CORS — apenas domínio de produção
app.cors.allowed-origins=https://gestor.convertix.net.br

# Asaas (obrigatório via env)
asaas.base-url=${ASAAS_BASE_URL:https://api.asaas.com/api/v3}
asaas.api-key=${ASAAS_API_KEY}
asaas.webhook-token=${ASAAS_WEBHOOK_TOKEN}

# Admin NÃO é criado automaticamente em produção
app.admin.auto-create=false

# HSTS / proxy reverso
server.forward-headers-strategy=framework
