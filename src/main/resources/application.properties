spring.application.name=gestor

# Perfil padrão: local. Em produção use SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Servidor
server.address=${SERVER_ADDRESS:localhost}
server.port=${SERVER_PORT:5000}
server.forward-headers-strategy=framework
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-exception=false
server.tomcat.connection-timeout=20000
server.tomcat.max-connections=10000
server.tomcat.accept-count=100
server.tomcat.threads.max=200
server.tomcat.max-http-form-post-size=6MB
server.max-http-request-header-size=16KB

# JPA / Hibernate (comuns)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.auto_quote_keyword=true

# Jackson
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# JWT (secret vem do perfil)
jwt.timezone=America/Sao_Paulo
jwt.issuer=convertix-gestor
jwt.audience=gestor-api
jwt.expiration-hours=24
jwt.clock-skew-seconds=30

# Upload
app.upload.dir=${APP_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# CORS (sobrescrito por perfil)
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,Accept,Origin,X-Requested-With
app.cors.exposed-headers=X-RateLimit-Remaining,Retry-After,X-RateLimit-Limit
app.cors.max-age=3600

# Rate limiting (por IP)
app.rate-limit.login-per-minute=5
app.rate-limit.cadastro-per-minute=10
app.rate-limit.api-per-minute=100

# Asaas timeouts
asaas.connect-timeout-ms=5000
asaas.read-timeout-ms=20000
asaas.max-retries=3
asaas.retry-delay-ms=500
