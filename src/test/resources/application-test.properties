spring.datasource.url=jdbc:h2:mem:gestor_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.jackson.property-naming-strategy=SNAKE_CASE

spring.application.swagger.auto-open=false

jwt.secret=convertix-gestor-jwt-secret-key-minimo-256-bits-para-hs256-seguro
jwt.timezone=America/Sao_Paulo
