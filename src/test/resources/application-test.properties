spring.datasource.url=jdbc:h2:mem:gestor_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.jackson.property-naming-strategy=SNAKE_CASE

spring.application.swagger.auto-open=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

jwt.secret=convertix-gestor-jwt-secret-key-minimo-256-bits-para-hs256-seguro
jwt.timezone=America/Sao_Paulo
jwt.issuer=convertix-gestor
jwt.audience=gestor-api
jwt.expiration-hours=24
jwt.clock-skew-seconds=30

app.cors.allowed-origins=http://localhost:3000
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,Accept,Origin,X-Requested-With
app.cors.exposed-headers=X-RateLimit-Remaining,Retry-After
app.cors.max-age=3600

app.rate-limit.login-per-minute=1000
app.rate-limit.cadastro-per-minute=1000
app.rate-limit.api-per-minute=10000

asaas.api-key=
asaas.webhook-token=test-webhook-token
asaas.base-url=https://sandbox.asaas.com/api/v3
